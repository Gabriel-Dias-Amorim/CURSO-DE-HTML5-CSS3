<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personalização de links</title>
    <style>
        body{
            font: normal 20px arial, helvetica, sans-serif;
            background-color: blanchedalmond;
        }
        a{
            font-weight: bold;
            text-decoration: none;
            color: blue;
        }
        a:visted{
            color: yellow;
        }
        a:houver{
            text-decoration: underline;
        }
        .especial{
            color: white;
            background-color: black;
            text-decoration: none;
        }
        .especial::before{
            content: "<";
            font-weight: lighter;
        }
        .especial::after{
           content: "<";
           font-weight: lighter;
        }
    </style>
</head>
<body>
    <h1>personalizado um link</h1>
    <p>para aprender html e css acesse o 
        <a href="https://gustavoguanabara.github.io"> github do Guanabara</a>
    </p>
    <p>se quiser conhecer mais sobre os padroes, visite o site do 
        <a href="https://www.w3c.br"> escritório do w3c no brasil</a>
    </p>
    <p>para acompanhar o curso acesse o 
        <a href="https://www.youtube.com/cursoemvideo/" class="especial"> canal do curso em video</a>
    </p>
</body>
</html>
