<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: blanchedalmond;
        }
    </style>
</head>
<body>
    <h1 style="background-color: blue; color: white; font-family: Arial, Helvetica, sans-serif;">exemplo de cores 1</h1>
    <!-- representação por nomes-->
    <h1 style="background-color: #000100FF; color: #00FFFFFF; font-family: Arial, Helvetica, sans-serif;">exemplo de cores 2</h1>
    <!-- representação por código hexadecimal-->
    <h1 style="background-color: hsl(20, 70%, 50%);">exemplo de cores 3</h1>
    <!-- representação por HLS(hue, sturation e luminosity)-->
    <h1 style="background-color: rgb(100, 100,200);">exemplo de cores 4</h1>
    <!-- representação por RGB (red, green e blue)-->
     <p><a href="../index.html"><img src="imagem/voltar.png" alt="voltar"></a></p>
</body>
</html>
