<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem dinamicas e áudio</title>
</head>
<body>
    <h1>imagens dinâmicas</h1>
    <picture>
        <source media="(max-width: 700px)" srcset="imagens/tamanho p.png" type="image/png">
        <source media="(max-width:900px )" srcset="imagens/tamanho m.png" type="image/png">
        <img src="imagens/tamanho g.png" alt="imagem flexível" width="100%">
    </picture>
    <h1>adicionando áudio</h1>
    <audio>
        <source src="downloads/music.mp3" type="audio/mp3">
    </audio>
    <audio src="downloads/music.mp3"></audio>
</body>
</html>
