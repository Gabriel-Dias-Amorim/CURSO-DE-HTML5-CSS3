<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagem dinamicas e áudio</title>
</head>
<body>
    <h1>imagens dinâmicas</h1>
    <picture>
        <source media="(min-width: 600px)" srcset="imagens/tamanho p.png" type="image/png">
        <source media="(min-width:850px )" srcset="imagens/tamanho m.png" type="image/png">
        <img src="imagens/tamanho g.png" width="200%"="imagem flexível">
    </picture>
    <h1>adicionando áudio</h1>
    <audio src="downloads/audio.mp3"downloads controls autoplay></audio>
</body>
</html>
